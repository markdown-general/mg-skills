# chat-tools.conf — Per-system DOM selectors and settings

# Grok
GROK_URL_PATTERN="grok.com"
GROK_INPUT_SELECTOR=".tiptap.ProseMirror"
GROK_SEND_SELECTOR="button[aria-label=\"Submit\"]"
GROK_BUBBLE_CLASS=".message-bubble"
GROK_TIMEOUT=120
GROK_INTERVAL=2

# Claude
CLAUDE_URL_PATTERN="claude.ai"
CLAUDE_INPUT_SELECTOR="[data-testid=\"chat-input\"]"
CLAUDE_SEND_SELECTOR="button[aria-label=\"Send message\"]"
CLAUDE_BUBBLE_CLASS=".standard-markdown"
CLAUDE_TIMEOUT=120
CLAUDE_INTERVAL=2

# Response extraction selectors
GROK_RESPONSE_SELECTOR=".message-bubble"
CLAUDE_RESPONSE_SELECTOR=".font-claude-response"
